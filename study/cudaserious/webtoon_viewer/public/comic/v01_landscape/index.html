<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V01 GPU 부서 첫 출근 - Landscape</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #121212;
        color: #f7f4ea;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 14px 20px;
        background: rgba(18,18,18,.9);
        border-bottom: 1px solid rgba(255,255,255,.14);
        backdrop-filter: blur(12px);
      }
      h1 {
        margin: 0;
        font-size: clamp(18px, 3vw, 28px);
        letter-spacing: -0.04em;
      }
      a {
        color: #ffca28;
        text-decoration: none;
        font-weight: 900;
      }
      main {
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: 14px 10px 54px;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0 0 14px;
        background: #fff;
        box-shadow: 0 16px 44px rgba(0,0,0,.4);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>V01 GPU 부서 첫 출근 · 교육 만화 슬라이드</h1>
      <a href="manifest.json">manifest</a>
    </header>
    <main>
      <img src="final/001.webp" alt="V01 landscape panel 1" loading="eager" />
      <img src="final/002.webp" alt="V01 landscape panel 2" loading="lazy" />
      <img src="final/003.webp" alt="V01 landscape panel 3" loading="lazy" />
      <img src="final/004.webp" alt="V01 landscape panel 4" loading="lazy" />
      <img src="final/005.webp" alt="V01 landscape panel 5" loading="lazy" />
      <img src="final/006.webp" alt="V01 landscape panel 6" loading="lazy" />
      <img src="final/007.webp" alt="V01 landscape panel 7" loading="lazy" />
      <img src="final/008.webp" alt="V01 landscape panel 8" loading="lazy" />
      <img src="final/009.webp" alt="V01 landscape panel 9" loading="lazy" />
      <img src="final/010.webp" alt="V01 landscape panel 10" loading="lazy" />
      <img src="final/011.webp" alt="V01 landscape panel 11" loading="lazy" />
      <img src="final/012.webp" alt="V01 landscape panel 12" loading="lazy" />
      <img src="final/013.webp" alt="V01 landscape panel 13" loading="lazy" />
      <img src="final/014.webp" alt="V01 landscape panel 14" loading="lazy" />
      <img src="final/015.webp" alt="V01 landscape panel 15" loading="lazy" />
      <img src="final/016.webp" alt="V01 landscape panel 16" loading="lazy" />
      <img src="final/017.webp" alt="V01 landscape panel 17" loading="lazy" />
      <img src="final/018.webp" alt="V01 landscape panel 18" loading="lazy" />
      <img src="final/019.webp" alt="V01 landscape panel 19" loading="lazy" />
      <img src="final/020.webp" alt="V01 landscape panel 20" loading="lazy" />
    </main>
  </body>
</html>
