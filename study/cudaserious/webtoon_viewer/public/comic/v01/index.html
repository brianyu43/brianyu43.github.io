<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V01 GPU 부서 첫 출근</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        background: #141414;
        color: #f5f5f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans KR", sans-serif;
      }
      header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(255,255,255,0.12);
        background: rgba(20,20,20,0.88);
        backdrop-filter: blur(14px);
      }
      h1 {
        margin: 0;
        font-size: clamp(18px, 3vw, 28px);
      }
      a {
        color: #ffca28;
        text-decoration: none;
        font-weight: 800;
      }
      main {
        width: min(100%, 760px);
        margin: 0 auto;
        padding: 14px 0 48px;
      }
      img {
        display: block;
        width: 100%;
        height: auto;
        margin: 0 0 12px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>V01 GPU 부서 첫 출근</h1>
      <a href="manifest.json">manifest</a>
    </header>
    <main>
      <img src="final/001.webp" alt="V01 panel 1" loading="eager" />
      <img src="final/002.webp" alt="V01 panel 2" loading="lazy" />
      <img src="final/003.webp" alt="V01 panel 3" loading="lazy" />
      <img src="final/004.webp" alt="V01 panel 4" loading="lazy" />
      <img src="final/005.webp" alt="V01 panel 5" loading="lazy" />
      <img src="final/006.webp" alt="V01 panel 6" loading="lazy" />
      <img src="final/007.webp" alt="V01 panel 7" loading="lazy" />
      <img src="final/008.webp" alt="V01 panel 8" loading="lazy" />
      <img src="final/009.webp" alt="V01 panel 9" loading="lazy" />
      <img src="final/010.webp" alt="V01 panel 10" loading="lazy" />
      <img src="final/011.webp" alt="V01 panel 11" loading="lazy" />
      <img src="final/012.webp" alt="V01 panel 12" loading="lazy" />
      <img src="final/013.webp" alt="V01 panel 13" loading="lazy" />
      <img src="final/014.webp" alt="V01 panel 14" loading="lazy" />
      <img src="final/015.webp" alt="V01 panel 15" loading="lazy" />
      <img src="final/016.webp" alt="V01 panel 16" loading="lazy" />
      <img src="final/017.webp" alt="V01 panel 17" loading="lazy" />
      <img src="final/018.webp" alt="V01 panel 18" loading="lazy" />
      <img src="final/019.webp" alt="V01 panel 19" loading="lazy" />
      <img src="final/020.webp" alt="V01 panel 20" loading="lazy" />
    </main>
  </body>
</html>
